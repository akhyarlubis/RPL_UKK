<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Siswa — Pengaduan Sarana Sekolah</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-green-700 text-white px-6 py-4 flex justify-between items-center shadow">
    <h1 class="text-lg font-bold">Dashboard Siswa</h1>
    <button onclick="logout()" class="bg-green-800 hover:bg-green-900 px-4 py-2 rounded text-sm">Logout</button>
  </nav>

  <div class="max-w-4xl mx-auto p-6">
    <!-- Form Aspirasi Baru -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Buat Aspirasi Baru</h2>
      <form onsubmit="submitAspirasi(event)">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
            <select id="inp-kategori" required class="w-full border rounded px-3 py-2 text-sm">
              <option value="">Pilih kategori...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi</label>
            <input type="text" id="inp-lokasi" required
              class="w-full border rounded px-3 py-2 text-sm" placeholder="Contoh: Ruang kelas 10A" />
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan</label>
          <textarea id="inp-keterangan" rows="3" required
            class="w-full border rounded px-3 py-2 text-sm" placeholder="Jelaskan masalah yang ditemukan..."></textarea>
        </div>
        <button type="submit"
          class="bg-green-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">
          Kirim Aspirasi
        </button>
        <span id="submit-msg" class="ml-3 text-sm hidden"></span>
      </form>
    </div>

    <!-- History Aspirasi -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="px-6 py-4 border-b">
        <h2 class="text-lg font-bold text-gray-800">History Aspirasi Saya</h2>
      </div>
      <div id="aspirasi-list" class="divide-y">
        <div class="px-6 py-8 text-center text-gray-400">Memuat data...</div>
      </div>
    </div>
  </div>

  <!-- Modal Detail -->
  <div id="modal-detail" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-lg">
      <h3 class="text-lg font-bold mb-4">Detail Aspirasi</h3>
      <div id="detail-content" class="text-sm space-y-2"></div>
      <button onclick="document.getElementById('modal-detail').classList.add('hidden')"
        class="mt-4 w-full bg-gray-200 py-2 rounded hover:bg-gray-300">Tutup</button>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'siswa') {
      window.location.href = '/login.html';
    }

    const headers = {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    };

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    function statusBadge(status) {
      const colors = {
        Menunggu: 'bg-yellow-100 text-yellow-700',
        Proses: 'bg-blue-100 text-blue-700',
        Selesai: 'bg-green-100 text-green-700',
      };
      return `<span class="px-2 py-1 rounded-full text-xs font-medium ${colors[status] || ''}">${status}</span>`;
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // Load kategori for dropdown
    async function loadKategori() {
      try {
        const res = await fetch('/api/kategori');
        const json = await res.json();
        const select = document.getElementById('inp-kategori');
        (json.data || []).forEach(k => {
          const opt = document.createElement('option');
          opt.value = k.idKategori;
          opt.textContent = k.ketKategori;
          select.appendChild(opt);
        });
      } catch {}
    }

    async function submitAspirasi(e) {
      e.preventDefault();
      const msg = document.getElementById('submit-msg');
      msg.classList.add('hidden');

      const body = {
        id_kategori: Number(document.getElementById('inp-kategori').value),
        lokasi: document.getElementById('inp-lokasi').value,
        keterangan: document.getElementById('inp-keterangan').value,
      };

      try {
        const res = await fetch('/api/siswa/aspirasi', {
          method: 'POST', headers, body: JSON.stringify(body),
        });
        if (res.status === 401 || res.status === 403) return logout();
        const json = await res.json();

        if (!res.ok) {
          msg.textContent = json.error;
          msg.className = 'ml-3 text-sm text-red-600';
          return;
        }

        msg.textContent = 'Aspirasi berhasil dikirim!';
        msg.className = 'ml-3 text-sm text-green-600';
        document.getElementById('inp-kategori').value = '';
        document.getElementById('inp-lokasi').value = '';
        document.getElementById('inp-keterangan').value = '';
        loadAspirasi();
      } catch {
        msg.textContent = 'Gagal mengirim aspirasi';
        msg.className = 'ml-3 text-sm text-red-600';
      }
    }

    async function loadAspirasi() {
      try {
        const res = await fetch('/api/siswa/aspirasi', { headers });
        if (res.status === 401 || res.status === 403) return logout();
        const json = await res.json();
        renderList(json.data || []);
      } catch {
        document.getElementById('aspirasi-list').innerHTML =
          '<div class="px-6 py-8 text-center text-red-500">Gagal memuat data</div>';
      }
    }

    function renderList(rows) {
      const el = document.getElementById('aspirasi-list');
      if (rows.length === 0) {
        el.innerHTML = '<div class="px-6 py-8 text-center text-gray-400">Belum ada aspirasi</div>';
        return;
      }
      el.innerHTML = rows.map(r => `
        <div class="px-6 py-4 hover:bg-gray-50 cursor-pointer" onclick="showDetail(${r.idAspirasi})">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-medium text-gray-800">${r.keterangan}</p>
              <p class="text-xs text-gray-500 mt-1">${r.ketKategori || '-'} &middot; ${r.lokasi} &middot; ${formatDate(r.createdAt)}</p>
            </div>
            <div class="ml-4">${statusBadge(r.status)}</div>
          </div>
          ${r.feedback ? `<p class="mt-2 text-sm text-gray-600 bg-gray-50 rounded px-3 py-2"><strong>Feedback:</strong> ${r.feedback}</p>` : ''}
        </div>
      `).join('');
    }

    async function showDetail(id) {
      try {
        const res = await fetch(`/api/siswa/aspirasi/${id}`, { headers });
        if (res.status === 401 || res.status === 403) return logout();
        const json = await res.json();
        const r = json.data;

        document.getElementById('detail-content').innerHTML = `
          <div class="grid grid-cols-2 gap-2">
            <div><strong>Kategori:</strong></div><div>${r.ketKategori || '-'}</div>
            <div><strong>Lokasi:</strong></div><div>${r.lokasi}</div>
            <div><strong>Keterangan:</strong></div><div>${r.keterangan}</div>
            <div><strong>Status:</strong></div><div>${statusBadge(r.status)}</div>
            <div><strong>Feedback:</strong></div><div>${r.feedback || '<span class="text-gray-400">Belum ada</span>'}</div>
            <div><strong>Tanggal:</strong></div><div>${formatDate(r.createdAt)}</div>
            <div><strong>Update:</strong></div><div>${formatDate(r.updatedAt)}</div>
          </div>
        `;
        document.getElementById('modal-detail').classList.remove('hidden');
      } catch {}
    }

    loadKategori();
    loadAspirasi();
  </script>
</body>
</html>
