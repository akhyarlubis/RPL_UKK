<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pengaduan Sarana Sekolah</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Pengaduan Sarana Sekolah</h1>
    <p class="text-center text-gray-500 mb-6">Silakan login untuk melanjutkan</p>

    <!-- Tab Toggle -->
    <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
      <button id="tab-admin" onclick="switchTab('admin')"
        class="flex-1 py-2 text-sm font-medium rounded-md bg-white shadow text-blue-600">
        Admin
      </button>
      <button id="tab-siswa" onclick="switchTab('siswa')"
        class="flex-1 py-2 text-sm font-medium rounded-md text-gray-500">
        Siswa
      </button>
    </div>

    <!-- Admin Login Form -->
    <form id="form-admin" onsubmit="loginAdmin(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="admin-email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="admin@sekolah.com" />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="admin-password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Masukkan password" />
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
        Login sebagai Admin
      </button>
    </form>

    <!-- Siswa Login Form -->
    <form id="form-siswa" class="hidden" onsubmit="loginSiswa(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">NIS</label>
        <input type="number" id="siswa-nis" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Masukkan NIS" />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="siswa-password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Masukkan password" />
      </div>
      <button type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700 transition">
        Login sebagai Siswa
      </button>
    </form>

    <!-- Error Message -->
    <div id="error-msg" class="mt-4 text-red-600 text-sm text-center hidden"></div>

    <p class="text-center text-gray-400 text-xs mt-6">
      Belum punya akun admin? <a href="/register.html" class="text-blue-500 hover:underline">Daftar di sini</a>
    </p>
  </div>

  <script>
    function switchTab(tab) {
      const tabAdmin = document.getElementById('tab-admin');
      const tabSiswa = document.getElementById('tab-siswa');
      const formAdmin = document.getElementById('form-admin');
      const formSiswa = document.getElementById('form-siswa');
      document.getElementById('error-msg').classList.add('hidden');

      if (tab === 'admin') {
        tabAdmin.className = 'flex-1 py-2 text-sm font-medium rounded-md bg-white shadow text-blue-600';
        tabSiswa.className = 'flex-1 py-2 text-sm font-medium rounded-md text-gray-500';
        formAdmin.classList.remove('hidden');
        formSiswa.classList.add('hidden');
      } else {
        tabSiswa.className = 'flex-1 py-2 text-sm font-medium rounded-md bg-white shadow text-green-600';
        tabAdmin.className = 'flex-1 py-2 text-sm font-medium rounded-md text-gray-500';
        formSiswa.classList.remove('hidden');
        formAdmin.classList.add('hidden');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    async function loginAdmin(e) {
      e.preventDefault();
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error);

        localStorage.setItem('token', data.data);
        localStorage.setItem('role', 'admin');
        window.location.href = '/admin.html';
      } catch {
        showError('Gagal terhubung ke server');
      }
    }

    async function loginSiswa(e) {
      e.preventDefault();
      const nis = Number(document.getElementById('siswa-nis').value);
      const password = document.getElementById('siswa-password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nis, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error);

        localStorage.setItem('token', data.data);
        localStorage.setItem('role', 'siswa');
        window.location.href = '/siswa.html';
      } catch {
        showError('Gagal terhubung ke server');
      }
    }
  </script>
</body>
</html>
